#Configmap of general application config for all microservices
apiVersion: v1
kind: ConfigMap
metadata:
  name: yas-configuration-configmap
  annotations:
    reloader.stakater.com/match: "true"
data:
  application.yaml: |
    {{- $configStr := toYaml .Values.applicationConfig -}}
    {{- $targetDomain := .Values.global.domain | default "yas.local.com" -}}
    {{- tpl (replace "yas.local.com" $targetDomain $configStr) . | nindent 4 }}
  logback.xml: |
    {{- .Values.logbackConfig | nindent 4 }}
---
